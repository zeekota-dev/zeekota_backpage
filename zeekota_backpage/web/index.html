<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZeeKota Backpage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main id="phoneRoot" class="phone-root" aria-live="polite">
        <section id="phoneShell" class="phone-shell">
            <div class="speaker"></div>
            <div class="screen">
                <header class="topbar">
                    <div class="brand">
                        <img src="assets/zeekota-mark.svg" alt="">
                        <div>
                            <strong id="appTitle"></strong>
                            <span id="appSubtitle"></span>
                        </div>
                    </div>
                    <button id="closeBtn" class="icon-btn" type="button" aria-label="Close">x</button>
                </header>
                <nav id="tabs" class="tabs"></nav>
                <section id="content" class="content"></section>
            </div>
            <div class="home-line"></div>
        </section>
    </main>

    <aside id="interactionRoot" class="interaction-root"></aside>
    <aside id="promptRoot" class="prompt-root"></aside>
    <aside id="toastRoot" class="toast-root"></aside>
    <aside id="modalRoot" class="modal-root"></aside>

    <script src="js/app.js"></script>
</body>
</html>
